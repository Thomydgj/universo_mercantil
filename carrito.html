<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Carrito</title>
</head>
<body>

    <header id="header"></header>
 


    <section class="carrito">
   

      <form class="checkout-form">

        <h1>Checkout</h1> 

        <h3 class="datos-personales">Datos Personales</h3>

        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" placeholder="Nombre" required>
        </div>
      
        <div class="form-group">
          <label for="apellidos">Apellidos:</label>
          <input type="text" id="apellidos" placeholder="Apellidos" required>
        </div>
      
        <!-- <div class="form-group full-width">
          <label for="cedula">Cédula:</label>
          <input type="text" id="cedula" placeholder="Cédula" required>
        </div> -->
      
        <div class="form-group">
          <label for="telefono">Teléfono:</label>
          <input type="tel" id="telefono" placeholder="312 345 6789" required>
        </div>
      
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" required>
        </div>
      
        <h3 class="datos-entrega">Datos de Entrega</h3>
      
        <div class="form-group">
          <label for="departamento">Departamento:</label>
          <select id="departamento" required></select>
        </div>
      
        <div class="form-group full-width">
          <label for="ciudad">Ciudad:</label>
          <select id="ciudad" required></select>
        </div>
      
        <div class="form-group full-width">
          <label for="direccion">Dirección:</label>
          <input type="text" id="direccion" placeholder="Dirección" required>
        </div>
      
        <div class="form-group full-width">
          <label for="detalle-direccion">Detalle de Dirección:</label>
          <input type="text" id="detalle-direccion" placeholder="Casa, apartamento, barrio, etc...">
        </div>
      
        <button type="submit" class="btn-confirmar">Confirmar Datos</button>
      </form>

      <div  id="container-tarjetas-carrito" class="carrito-productos">
        <template id="template-carrito">
          <article class="tarjeta-carrito">
            <figure>


              <div class="imagen-carrito">
                <img src="" alt="Producto 1">
              </div>
              <div class="detalles-carrito">
                <h3 class="nombre-carrito"></h3>
                <div class="en-linea">
                  <p class="precio-carrito"></p>
                  <div class="cantidad-carrito">
                    <label for="cantidad1">Cantidad:</label>
                    <input type="number" id="cantidad1" name="cantidad1" value="1" min="1">
                  </div>
                </div>
                <button class="btn-eliminar">Eliminar</button>
              </div>
            </figure>
          </article>





        </template>
      </div>

    </section>

    

    <footer id="footer"></footer>
    <script src="./scripts/loadComponents.js"></script>
    <script src="./scripts/loadColombia.js"></script>
    <script src="./scripts/loadCarrito.js"></script>
    <script src="./scripts/confirmarEnvio.js"></script>
    <script src="./scripts/checkout.js"></script>
</body>
</html>
