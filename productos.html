<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Universo Mercantil</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

    <header id="header"></header>
    <main id="productos" class="catalogo-page">
        <div id="banner-productos" class="banner"></div>

        <section class="catalogo-intro">
            <p class="catalogo-breadcrumb"><a href="/principal.html">Inicio</a> / Catalogo</p>
            <h1>Catalogo de Productos</h1>
            <div class="decorative-line"></div>
            <!-- <p id="catalogo-descripcion" class="catalogo-descripcion">Explora soluciones de empaque industrial por categoria y encuentra la opcion ideal para tu operacion.</p> -->

            <div class="catalogo-meta">
                <span id="categoria-actual" class="meta-tag">Todas las categorias</span>
                <span id="contador-productos" class="meta-count">0 productos</span>
            </div>

            <nav id="filtro-categorias" class="filtro-categorias" aria-label="Filtrar por categoria"></nav>
        </section>

        <section id="container-productos" class="container-productos">
            <!-- Plantilla oculta -->
            <template id="template-producto">
                <a class="link-producto" href="#">
                    <article class="tarjeta-producto">
                        <figure>
                            <div class="imagen-producto">
                                <img src="" alt="">
                            </div>
                        
                            <div class="detalles-producto">
                                <h3 class="nombre-producto"></h3>
                                <p class="descripcion-corta-producto"></p>
                                <!-- <p class="precio-producto"></p> -->
                            </div>
                        </figure>
                    </article>
                </a>
            </template>

        </section>

        <section class="catalogo-asesoria">
            <div class="catalogo-asesoria-content">
                <h2>¿Necesitas Asesoria para Elegir el Empaque Correcto?</h2>
                <p>Te ayudamos a seleccionar el material y formato segun tu producto, canal y objetivo de conservacion.</p>
                <a href="/principal.html#cotizacion" class="btn-catalogo-asesoria">Solicitar asesoria</a>
            </div>
        </section>

    </main>
    <footer id="footer"></footer>
    <script src="./scripts/loadComponents.js"></script>
    <script src="./scripts/productos.js"></script>
    <script src="./scripts/loadProductos.js"></script>
    
</body>
</html>
