<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías</title>
  <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
  <header id="header"></header>

  <main id="categorias" class="categorias-page">


     <div id="banner-categoria" class="banner"></div>

    <section class="categorias-intro">
      <p class="catalogo-breadcrumb"><a href="/principal.html">Inicio</a> / Categorias</p>
      <h1>Categorias de Empaque</h1>
      <div class="decorative-line"></div>
      

      <div class="catalogo-meta">
        <span id="tipo-actual" class="meta-tag">Todos los tipos</span>
        <span id="contador-categorias" class="meta-count">0 categorias</span>
      </div>

      <nav id="filtro-tipos" class="filtro-categorias" aria-label="Filtrar por tipo de empaque"></nav>
    </section>


    <!-- Contenedor vacío donde se insertarán las tarjetas -->
    <section id="container-categorias" class="container-categorias">

        <!-- Plantilla oculta -->
        <template id="template-categoria">
          <a class="link-categoria" href="#">
            <article class="tarjeta-categoria">
              <figure>
                <div class="imagen-categoria">
                  <img src="" alt="">
                </div>
                <div class="titulo-categoria">
                  <h3 class="nombre-categoria"></h3>
                </div>
              </figure>
            </article>
          </a>
        </template>

    </section>

    <section class="categorias-asesoria">
      <div class="categorias-asesoria-content">
        <h2>No sabes que categoria elegir?</h2>
        <p>Nuestro equipo te orienta para seleccionar el tipo de empaque ideal segun tu producto, canal y necesidad de conservacion.</p>
        <a href="/principal.html#cotizacion" class="btn-catalogo-asesoria">Hablar con un asesor</a>
      </div>
    </section>
  </main>

  <footer id="footer"></footer>

  <!-- Scripts -->
  <script src="./scripts/loadComponents.js"></script>
  <script src="./scripts/categorias.js"></script>
  <script src="./scripts/loadCategorias.js"></script>
</body>
</html>
